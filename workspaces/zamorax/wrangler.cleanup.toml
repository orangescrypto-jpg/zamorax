# wrangler.cleanup.toml
# =====================================================================
# Config for the weekly D1 + R2 cleanup worker.
# Deploy with: wrangler deploy --config wrangler.cleanup.toml
#
# SECRETS — never hardcode account_id or database_id here.
# Wrangler reads account_id from the CLOUDFLARE_ACCOUNT_ID env var
# automatically. database_id uses shell substitution below.
#
# Before deploying, export from your Vercel env values:
#   export CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT_ID
#   export CF_D1_DATABASE_ID=<your-d1-database-id>
#
# Both CF_ACCOUNT_ID and CF_D1_DATABASE_ID are already set in Vercel.
# =====================================================================

name = "zamorax-cleanup"
main = "workers/cleanup-cron.ts"
compatibility_date = "2026-06-29"

# account_id is NOT set here — Wrangler picks it up automatically from
# the CLOUDFLARE_ACCOUNT_ID environment variable in your shell/CI.

# Runs every Sunday at 02:00 UTC (~03:00 Africa/Lagos, WAT is UTC+1)
[triggers]
crons = ["0 2 * * 0"]

# Bind the SAME D1 database your main app uses.
# database_id uses shell variable substitution — set CF_D1_DATABASE_ID
# in your terminal/CI before running wrangler deploy.
[[d1_databases]]
binding = "DB"
database_name = "ZAMORAX_DB"
database_id = "${CF_D1_DATABASE_ID}"

# Bind the SAME R2 bucket your main app uses.
[[r2_buckets]]
binding = "ZAMORAX_BUCKET"
bucket_name = "zamorax-files"

# Start in dry-run mode. Watch a few weekly logs via:
#   wrangler tail zamorax-cleanup
# before flipping this to "false".
[vars]
DRY_RUN = "true"
