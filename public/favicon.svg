<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0a0a0a"/>
  <!-- Hexagon - flat top/bottom, rounded corners via rx on path -->
  <path d="M256 52 L422 150 L422 362 L256 460 L90 362 L90 150 Z"
        fill="none" stroke="#f97316" stroke-width="24" stroke-linejoin="round"/>
  <!-- Z top horizontal bar -->
  <line x1="168" y1="168" x2="332" y2="168" stroke="#f97316" stroke-width="46" stroke-linecap="round"/>
  <!-- Z diagonal stroke -->
  <line x1="320" y1="168" x2="185" y2="332" stroke="#f97316" stroke-width="46" stroke-linecap="round"/>
  <!-- Z bottom horizontal bar (shorter, ends before arrow) -->
  <line x1="172" y1="332" x2="285" y2="332" stroke="#f97316" stroke-width="46" stroke-linecap="round"/>
  <!-- Arrow head breaking out of hexagon bottom-right -->
  <path d="M278 305 L355 340 L278 372" fill="#f97316"/>
</svg>
